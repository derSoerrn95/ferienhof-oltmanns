<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f3a34">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title | default .Site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="de_DE">

  <!-- Fonts: Fraunces (display, editorial serif) + Inter Tight (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- MapLibre GL JS (for VersaTiles map) -->
  <link rel="preconnect" href="https://tiles.versatiles.org" crossorigin>
  <link href="{{ "vendor/maplibre-gl/maplibre-gl.css" | relURL }}" rel="stylesheet">

  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LodgingBusiness",
    "name": "Ferienhof Oltmanns",
    "description": "{{ .Site.Params.description }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Esens",
      "addressRegion": "Ostfriesland",
      "addressCountry": "DE"
    },
    "email": "{{ .Site.Params.email }}",
    "url": "{{ .Site.BaseURL }}"
  }
  </script>
</head>
<body>
  {{ partial "header.html" . }}

  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- MapLibre GL JS + VersaTiles style (for the map section, self-hosted) -->
  <script src="{{ "vendor/maplibre-gl/maplibre-gl.js" | relURL }}" defer></script>
  <script src="{{ "vendor/versatiles-style/versatiles-style.js" | relURL }}" defer></script>

  <script src="{{ "js/main.js" | relURL }}" defer></script>
</body>
</html>
